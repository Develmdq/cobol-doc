<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COBOL Doc — Generador de Documentación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 15px; }
body { background: #0d1117; color: #cdd9f0; font-family: 'IBM Plex Sans', system-ui, sans-serif; line-height: 1.7; min-height: 100vh; }
a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0d1117; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

/* ─── VARIABLES ─── */
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --bg4: #21262d;
  --border: #30363d;
  --border2: #3d444d;
  --text: #cdd9f0;
  --muted: #7d8590;
  --muted2: #555f6b;
  --accent: #58a6ff;
  --accent2: #1f6feb;
  --green: #3fb950;
  --amber: #d29922;
  --coral: #f85149;
  --purple: #bc8cff;
  --teal: #39c5cf;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
}

/* ─── APP SHELL ─── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ─── TOP BAR ─── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 1rem;
}
.topbar-logo {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-logo .slash { color: var(--accent); }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.btn {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg4); border-color: var(--border2); }
.btn-primary {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
.btn-primary:hover { background: #388bfd; border-color: #388bfd; }
.btn-danger {
  background: transparent;
  border-color: #da3633;
  color: #f85149;
}
.btn-danger:hover { background: rgba(248,81,73,0.1); }
.btn-sm { padding: 3px 10px; font-size: 11px; }

/* ─── MAIN LAYOUT ─── */
.layout {
  display: flex;
  flex: 1;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
.sidebar-head {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-scroll { overflow-y: auto; flex: 1; padding-bottom: 1rem; }
.file-group { border-bottom: 1px solid var(--border); }
.file-group-header {
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg2);
  transition: background .12s;
}
.file-group-header:hover { background: var(--bg3); }
.file-group-header .ftype {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: .05em;
}
.ftype-cbl { background: rgba(63,185,80,.15); color: var(--green); }
.ftype-jcl { background: rgba(188,140,255,.15); color: var(--purple); }
.ftype-cpy { background: rgba(57,197,207,.15); color: var(--teal); }
.ftype-sql { background: rgba(210,153,34,.15); color: var(--amber); }
.ftype-txt { background: rgba(125,133,144,.15); color: var(--muted); }

.file-toc { list-style: none; }
.file-toc li a {
  display: block;
  padding: 3px 16px 3px 32px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  transition: color .12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-toc li a:hover { color: var(--text); text-decoration: none; }
.file-toc li.toc-section > a { padding-left: 32px; color: var(--muted); }
.file-toc li.toc-paragraph > a { padding-left: 44px; font-size: 10.5px; }

/* ─── CONTENT ─── */
.content {
  flex: 1;
  padding: 2rem 2.5rem;
  max-width: 900px;
  min-width: 0;
}

/* ─── UPLOAD ZONE ─── */
#upload-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 52px);
  padding: 3rem;
  text-align: center;
}
.drop-area {
  border: 2px dashed var(--border2);
  border-radius: 12px;
  padding: 3rem 4rem;
  max-width: 520px;
  width: 100%;
  transition: border-color .2s, background .2s;
  cursor: pointer;
}
.drop-area:hover, .drop-area.drag-over {
  border-color: var(--accent);
  background: rgba(88,166,255,.05);
}
.drop-icon {
  font-size: 48px;
  margin-bottom: 1rem;
  opacity: .5;
}
.drop-title {
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: .5rem;
}
.drop-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}
.drop-formats {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}
.format-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--muted);
}

/* ─── FILE CARDS ─── */
.file-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 2rem;
  overflow: hidden;
}
.file-card-header {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.file-card-name {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.file-card-meta {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}
.file-card-body { padding: 1.5rem 1.75rem; }

/* ─── DOC BLOCKS ─── */
.doc-header-block {
  margin-bottom: 1.5rem;
}
.doc-header-block h1, .doc-header-block h2 {
  font-family: var(--sans);
  font-weight: 600;
  color: var(--text);
  margin-bottom: .5rem;
}
.doc-header-block h1 { font-size: 20px; }
.doc-header-block h2 { font-size: 16px; color: var(--accent); }
.doc-header-block p { font-size: 13px; color: #aab4cc; margin-bottom: .4rem; }
.doc-header-block b, .doc-header-block strong { color: var(--accent); font-weight: 500; }
.doc-header-block hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
.doc-header-block .meta-row {
  display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: .5rem;
}
.doc-header-block .meta-item {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}
.doc-header-block .meta-item span { color: var(--accent); }

.doc-section {
  margin-top: 1.75rem;
}
.doc-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: .75rem;
}
.section-rule {
  border: none;
  border-top: 1px solid var(--border);
  flex: 1;
}
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.label-div   { background: rgba(88,166,255,.12); color: var(--accent); }
.label-sec   { background: rgba(188,140,255,.12); color: var(--purple); }
.label-para  { background: rgba(63,185,80,.12);  color: var(--green); }
.label-note  { background: rgba(57,197,207,.12); color: var(--teal); }
.label-jcl   { background: rgba(210,153,34,.12); color: var(--amber); }
.label-sql   { background: rgba(248,81,73,.12);  color: var(--coral); }

.section-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.note-box {
  background: var(--bg3);
  border-left: 3px solid var(--teal);
  border-radius: 0 6px 6px 0;
  padding: .75rem 1rem;
  margin: .5rem 0;
  font-size: 13px;
  color: #aab4cc;
  font-family: var(--mono);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.note-box.jcl-note { border-left-color: var(--amber); }
.note-box.sql-note { border-left-color: var(--coral); }

/* ─── EMPTY STATE ─── */
.refs-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.ref-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  text-decoration: none;
  transition: border-color .15s, background .15s;
}
.ref-badge:hover { background: var(--bg4); border-color: var(--accent); text-decoration: none; }
.ref-see  { border-left: 3px solid var(--accent); }
.ref-uses { border-left: 3px solid var(--green); }
.ref-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.ref-name  { color: var(--text); font-weight: 500; }
.ref-icon  { color: var(--accent); font-size: 11px; }
.ref-uses .ref-icon { color: var(--green); }

.empty-file {
  padding: 1rem 1.75rem;
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  font-style: italic;
}

/* ─── FILE LIST (sidebar added files) ─── */
.added-files {
  margin-top: 1.5rem;
  width: 100%;
  max-width: 520px;
}
.added-files-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: .5rem;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.added-file-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--bg2);
  margin-bottom: 4px;
  border: 1px solid var(--border);
}
.added-file-name {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  flex: 1;
}
.added-file-size { font-size: 11px; color: var(--muted); }

/* ─── PRINT ─── */
@media print {
  .topbar, .sidebar, .btn { display: none !important; }
  .content { max-width: 100%; padding: 0; }
  .file-card { break-inside: avoid; border: 1px solid #ccc; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 760px) {
  .sidebar { display: none; }
  .content { padding: 1rem; }
  .topbar { padding: 0 1rem; }
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <span class="slash">▊</span> COBOL<span style="color:var(--muted)">Doc</span>
    </div>
    <div class="topbar-actions">
      <span id="file-count-label" style="font-size:12px;color:var(--muted);display:none"></span>
      <button class="btn" id="btn-add-more" style="display:none" onclick="triggerFileInput()">+ Agregar archivos</button>
      <button class="btn btn-primary" id="btn-export" style="display:none" onclick="exportHtml()">Exportar HTML</button>
      <button class="btn btn-danger btn-sm" id="btn-clear" style="display:none" onclick="clearAll()">Limpiar</button>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar" style="display:none">
      <div class="sidebar-head">
        <span>Archivos</span>
      </div>
      <div class="sidebar-scroll" id="sidebar-toc"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content" id="main-content">

      <!-- UPLOAD ZONE -->
      <div id="upload-zone">
        <div class="drop-area" id="drop-area" onclick="triggerFileInput()">
          <div class="drop-icon">📂</div>
          <div class="drop-title">Arrastrá tus archivos acá</div>
          <div class="drop-sub">
            Soporta múltiples archivos.<br>
            Se ordenan según el orden en que los subís.
          </div>
          <button class="btn btn-primary" style="pointer-events:none">Seleccionar archivos</button>
          <div class="drop-formats">
            <span class="format-badge">.cbl</span>
            <span class="format-badge">.cob</span>
            <span class="format-badge">.jcl</span>
            <span class="format-badge">.cpy</span>
            <span class="format-badge">.sql</span>
            <span class="format-badge">.txt</span>
          </div>
        </div>
        <div class="added-files" id="pending-list" style="display:none">
          <div class="added-files-title">Archivos cargados</div>
          <div id="pending-rows"></div>
          <div style="margin-top:1rem;display:flex;gap:8px">
            <button class="btn btn-primary" onclick="buildDocs()">Generar documentación</button>
            <button class="btn" onclick="triggerFileInput()">+ Más archivos</button>
          </div>
        </div>
      </div>

      <!-- DOC OUTPUT -->
      <div id="doc-output" style="display:none"></div>

    </div>
  </div>
</div>

<input type="file" id="file-input" multiple accept=".cbl,.cob,.jcl,.cpy,.sql,.txt" style="display:none" onchange="handleFiles(this.files)">

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = { files: [] }; // { name, ext, type, content, id }

// ─── FILE INPUT ───────────────────────────────────────────────────────────────
function triggerFileInput() {
  document.getElementById('file-input').click();
}

function handleFiles(fileList) {
  const promises = [];
  for (const f of fileList) {
    const ext = f.name.split('.').pop().toLowerCase();
    const allowed = ['cbl','cob','jcl','cpy','sql','txt'];
    if (!allowed.includes(ext)) continue;
    promises.push(new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const id = 'f' + Date.now() + Math.random().toString(36).slice(2,6);
        state.files.push({ name: f.name, ext, type: extType(ext), content: e.target.result, id, size: f.size });
        res();
      };
      r.readAsText(f);
    }));
  }
  Promise.all(promises).then(() => {
    if (state.files.length > 0) showPendingList();
  });
}

function extType(ext) {
  const m = { cbl:'cbl', cob:'cbl', jcl:'jcl', cpy:'cpy', sql:'sql', txt:'txt' };
  return m[ext] || 'txt';
}

function showPendingList() {
  document.getElementById('pending-list').style.display = 'block';
  const rows = document.getElementById('pending-rows');
  rows.innerHTML = state.files.map((f,i) => `
    <div class="added-file-row" id="pr-${f.id}">
      <span class="ftype ftype-${f.type}">${f.type.toUpperCase()}</span>
      <span class="added-file-name">${f.name}</span>
      <span class="added-file-size">${(f.size/1024).toFixed(1)} KB</span>
      <button class="btn btn-sm" style="color:var(--coral);border-color:var(--coral)" onclick="removeFile('${f.id}')">✕</button>
    </div>
  `).join('');
}

function removeFile(id) {
  state.files = state.files.filter(f => f.id !== id);
  if (state.files.length === 0) {
    document.getElementById('pending-list').style.display = 'none';
  } else {
    showPendingList();
  }
}

function clearAll() {
  state.files = [];
  document.getElementById('doc-output').style.display = 'none';
  document.getElementById('doc-output').innerHTML = '';
  document.getElementById('upload-zone').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('pending-list').style.display = 'none';
  document.getElementById('btn-add-more').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('file-count-label').style.display = 'none';
  document.getElementById('file-input').value = '';
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
const dropArea = document.getElementById('drop-area');
['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, ev => {
  ev.preventDefault(); dropArea.classList.add('drag-over');
}));
['dragleave','drop'].forEach(e => dropArea.addEventListener(e, ev => {
  ev.preventDefault(); dropArea.classList.remove('drag-over');
}));
dropArea.addEventListener('drop', ev => {
  ev.preventDefault();
  handleFiles(ev.dataTransfer.files);
});

// ─── PARSERS ──────────────────────────────────────────────────────────────────

function parseCBL(src) {
  // Returns array of { kind, label, sublabel, content, anchor }
  const lines = src.split('\n');
  const blocks = [];

  // Metadata
  let programId = null;
  const progM = src.match(/PROGRAM-ID\s*\.\s*([A-Z0-9\-@#$]+)/i);
  if (progM) programId = progM[1].trim().toUpperCase();

  // --- Pass: extract *> COBOLDoc header block + @see/@uses directives ---
  let headerLines = [];
  let inHeader = false;
  const refs = []; // { kind: 'see'|'uses', name, url }
  for (const line of lines) {
    if (/^\s*\*>\s*\*\*/.test(line)) { inHeader = !inHeader; continue; }
    if (inHeader || /^\s*\*>/.test(line)) {
      const m = line.match(/^\s*\*>\s?(.*)/);
      if (!m) continue;
      const txt = m[1].trim();
      // @see NAME URL
      const seeM = txt.match(/^@see\s+([A-Z0-9\-@#$]+)\s+(https?:\/\/\S+)/i);
      if (seeM) { refs.push({ kind:'see', name: seeM[1].toUpperCase(), url: seeM[2] }); continue; }
      // @see URL (no name)
      const seeU = txt.match(/^@see\s+(https?:\/\/\S+)/i);
      if (seeU) { refs.push({ kind:'see', name: 'Referencia', url: seeU[1] }); continue; }
      // @uses NAME (optional URL)
      const usesM = txt.match(/^@uses\s+([A-Z0-9\-@#$]+)(?:\s+(https?:\/\/\S+))?/i);
      if (usesM) { refs.push({ kind:'uses', name: usesM[1].toUpperCase(), url: usesM[2]||null }); continue; }
      headerLines.push(txt);
    }
  }
  if (headerLines.length || refs.length) {
    blocks.push({ kind: 'header', label: programId || 'Encabezado', content: headerLines.join('\n'), refs, anchor: 'header' });
  }

  // --- Pass: extract *--- note blocks (col 7 star comments) ---
  // Strategy: collect consecutive lines that are part of a dashed-border comment block
  // Pattern: lines starting with * in col 7 (area A/B) or *----
  const noteBlockRe = /^.{6}\*(.*)$/; // col 7 = *
  const dashRe = /^[\-\*\s]+$/;

  let i = 0;
  let currentDivision = '';
  let currentSection = '';
  let currentParagraph = '';

  const divRe = /^\s{6,7}([A-Z][A-Z\-]*\s+DIVISION)\b/i;
  const secRe = /^\s{6,7}([A-Z0-9][A-Z0-9\-]*\s+SECTION)\b/i;
  const paraRe = /^\s{6,7}([A-Z0-9][A-Z0-9\-]*)\s*\.\s*$/i;

  while (i < lines.length) {
    const line = lines[i];

    // Track structure
    const dM = line.match(divRe);
    if (dM) { currentDivision = dM[1].toUpperCase().trim(); currentSection=''; currentParagraph=''; i++; continue; }
    const sM = line.match(secRe);
    if (sM) { currentSection = sM[1].toUpperCase().trim(); currentParagraph=''; i++; continue; }
    const pM = line.match(paraRe);
    if (pM) { currentParagraph = pM[1].toUpperCase().trim(); i++; continue; }

    // Detect start of a dashed note block: line is *--- or similar
    const isStarLine = noteBlockRe.test(line);
    if (isStarLine) {
      const inner = line.replace(/^.{6}\*/, '');
      const isDashBorder = /^\s*[\-\*]+\s*$/.test(inner) || /^\s*[\-\*]{3,}/.test(inner);

      if (isDashBorder) {
        // Collect the whole block until closing border
        const noteLines = [];
        i++; // skip opening border
        while (i < lines.length) {
          const nl = lines[i];
          const nm = nl.match(/^.{6}\*(.*)/);
          if (!nm) break;
          const ni = nm[1];
          if (/^\s*[\-\*]{3,}\s*$/.test(ni)) { i++; break; } // closing border
          // strip inline border chars at start/end: "* text *"
          const stripped = ni.replace(/^\s*\*?\s*/, '').replace(/\s*\*?\s*$/, '').trim();
          if (stripped) noteLines.push(stripped);
          i++;
        }
        if (noteLines.length) {
          const anchor = 'note-' + currentParagraph.replace(/\s+/g,'-') + '-' + blocks.length;
          blocks.push({
            kind: 'note',
            label: currentParagraph || currentSection || currentDivision || 'Nota',
            sublabel: currentDivision + (currentSection ? ' › ' + currentSection : ''),
            content: noteLines.join('\n'),
            anchor
          });
        }
        continue;
      }
    }
    i++;
  }

  return { programId, blocks };
}

function parseJCL(src) {
  const lines = src.split('\n');
  const blocks = [];
  let jobName = null;
  const jobM = src.match(/^\/\/([A-Z0-9@#$]{1,8})\s+JOB\b/im);
  if (jobM) jobName = jobM[1].trim().toUpperCase();

  // JCL comments: //* lines
  let noteLines = [];
  let stepContext = '';

  for (const line of lines) {
    const stepM = line.match(/^\/\/([A-Z0-9@#$]{1,8})\s+EXEC\b/i);
    if (stepM) {
      if (noteLines.length) {
        blocks.push({ kind: 'note', label: stepContext || 'Preámbulo', sublabel: 'JCL', content: noteLines.join('\n'), anchor: 'jcl-'+blocks.length });
        noteLines = [];
      }
      stepContext = stepM[1].toUpperCase() + ' (EXEC)';
      continue;
    }
    const ddM = line.match(/^\/\/([A-Z0-9@#$]{1,8})\s+DD\b/i);
    if (ddM) { stepContext = ddM[1].toUpperCase() + ' (DD)'; continue; }

    const comM = line.match(/^\/\/\*(.*)/);
    if (comM) {
      const txt = comM[1].trim();
      if (txt) noteLines.push(txt);
    } else {
      if (noteLines.length) {
        blocks.push({ kind: 'note', label: stepContext || 'General', sublabel: 'JCL', content: noteLines.join('\n'), anchor: 'jcl-'+blocks.length });
        noteLines = [];
      }
    }
  }
  if (noteLines.length) {
    blocks.push({ kind: 'note', label: stepContext || 'General', sublabel: 'JCL', content: noteLines.join('\n'), anchor: 'jcl-'+blocks.length });
  }

  return { programId: jobName, blocks };
}

function parseCPY(src) {
  // Copybooks: same as COBOL but label as COPY
  const result = parseCBL(src);
  if (!result.programId) {
    const m = src.match(/^\s*\d{0,6}\s*([A-Z][A-Z0-9\-]*)/im);
    if (m) result.programId = m[1].trim().toUpperCase();
  }
  return result;
}

function parseSQL(src) {
  const lines = src.split('\n');
  const blocks = [];
  let noteLines = [];
  let context = '';

  for (const line of lines) {
    const sM = line.match(/^\s*--\s*(.*)/);
    const bM = line.match(/^\s*\/\*(.*)/);
    const selM = line.match(/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|MERGE)\b/i);
    if (selM) {
      if (noteLines.length) { blocks.push({ kind:'note', label: context||'Consulta', sublabel:'SQL', content: noteLines.join('\n'), anchor:'sql-'+blocks.length }); noteLines=[]; }
      context = selM[1].toUpperCase();
    }
    if (sM && sM[1].trim()) noteLines.push(sM[1].trim());
    else if (bM && bM[1].trim()) noteLines.push(bM[1].replace('*/','').trim());
  }
  if (noteLines.length) blocks.push({ kind:'note', label: context||'General', sublabel:'SQL', content: noteLines.join('\n'), anchor:'sql-'+blocks.length });
  return { programId: 'SQL', blocks };
}

function parseFile(f) {
  switch(f.type) {
    case 'jcl': return parseJCL(f.content);
    case 'cpy': return parseCPY(f.content);
    case 'sql': return parseSQL(f.content);
    default:    return parseCBL(f.content);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function labelClass(kind, type) {
  if (type === 'jcl') return 'label-jcl';
  if (type === 'sql') return 'label-sql';
  if (kind === 'header') return 'label-div';
  if (kind === 'note') return 'label-note';
  return 'label-para';
}

function renderHeaderContent(html) {
  // Already has HTML tags from *> comments — render directly but strip **** lines
  return html.replace(/\*\*+/g,'').trim();
}

function renderNoteContent(text) {
  // Plain text from stripped comment blocks — escape HTML then add structure
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc;
}

function buildFileCard(f, parsed) {
  const { programId, blocks } = parsed;
  const title = programId || f.name.replace(/\.[^.]+$/,'').toUpperCase();
  const ftype = f.type;

  let body = '';
  if (!blocks.length) {
    body = `<div class="empty-file">No se encontraron comentarios documentados en este archivo.</div>`;
  } else {
    for (const b of blocks) {
      if (b.kind === 'header') {
        const refsHtml = (b.refs && b.refs.length) ? `
        <div class="refs-bar">
          ${b.refs.map(r => {
            const icon = r.kind === 'see' ? '↗' : '⟶';
            const label = r.kind === 'see' ? 'ver' : 'usa';
            const inner = `<span class="ref-label">${label}</span><span class="ref-name">${r.name}</span><span class="ref-icon">${icon}</span>`;
            return r.url
              ? `<a href="${r.url}" target="_blank" class="ref-badge ref-${r.kind}">${inner}</a>`
              : `<span class="ref-badge ref-${r.kind}">${inner}</span>`;
          }).join('')}
        </div>` : '';
        body += `
        <div class="doc-header-block" id="${b.anchor}">
          ${renderHeaderContent(b.content)}
          ${refsHtml}
        </div>`;
      } else {
        const lclass = labelClass(b.kind, ftype);
        const noteClass = ftype === 'jcl' ? 'note-box jcl-note' : ftype === 'sql' ? 'note-box sql-note' : 'note-box';
        body += `
        <div class="doc-section" id="${b.anchor}">
          <div class="doc-section-header">
            <hr class="section-rule">
            <span class="section-label ${lclass}">${ftype.toUpperCase()}</span>
            <span class="section-name">${b.label}</span>
            ${b.sublabel ? `<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${b.sublabel}</span>` : ''}
            <hr class="section-rule">
          </div>
          <div class="${noteClass}">${renderNoteContent(b.content)}</div>
        </div>`;
      }
    }
  }

  return `
  <div class="file-card" id="card-${f.id}">
    <div class="file-card-header">
      <span class="ftype ftype-${ftype}">${ftype.toUpperCase()}</span>
      <span class="file-card-name">${title}</span>
      <span class="file-card-meta">${f.name} · ${blocks.length} bloque${blocks.length!==1?'s':''}</span>
    </div>
    <div class="file-card-body">${body}</div>
  </div>`;
}

function buildSidebarToc(files, parsedList) {
  let html = '';
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const { programId, blocks } = parsedList[i];
    const title = programId || f.name.replace(/\.[^.]+$/,'').toUpperCase();
    const tocItems = blocks.map(b => `
      <li class="toc-paragraph">
        <a href="#${b.anchor}" title="${b.label}">${b.label}</a>
      </li>`).join('');
    html += `
    <div class="file-group">
      <div class="file-group-header" onclick="document.getElementById('card-${f.id}').scrollIntoView({behavior:'smooth'})">
        <span class="ftype ftype-${f.type}">${f.type.toUpperCase()}</span>
        ${title}
      </div>
      <ul class="file-toc">${tocItems}</ul>
    </div>`;
  }
  return html;
}

function buildDocs() {
  if (!state.files.length) return;
  const parsedList = state.files.map(f => parseFile(f));

  // Build output
  let cards = '';
  for (let i = 0; i < state.files.length; i++) {
    cards += buildFileCard(state.files[i], parsedList[i]);
  }

  document.getElementById('upload-zone').style.display = 'none';
  const out = document.getElementById('doc-output');
  out.innerHTML = cards;
  out.style.display = 'block';

  // Sidebar
  const sidebar = document.getElementById('sidebar');
  sidebar.style.display = 'flex';
  document.getElementById('sidebar-toc').innerHTML = buildSidebarToc(state.files, parsedList);

  // Topbar
  document.getElementById('btn-add-more').style.display = 'inline-block';
  document.getElementById('btn-export').style.display = 'inline-block';
  document.getElementById('btn-clear').style.display = 'inline-block';
  const lbl = document.getElementById('file-count-label');
  lbl.textContent = state.files.length + ' archivo' + (state.files.length!==1?'s':'');
  lbl.style.display = 'inline';
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportHtml() {
  // Capture the current rendered doc and inject into a self-contained file
  const docContent = document.getElementById('doc-output').innerHTML;
  const sidebarContent = document.getElementById('sidebar-toc').innerHTML;
  const styles = document.querySelector('style').textContent;
  const now = new Date().toLocaleDateString('es-AR', {year:'numeric',month:'long',day:'numeric'});

  const fullHtml = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COBOL Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>${styles}
.topbar-actions .btn-danger, #btn-add-more, #btn-export, #btn-clear { display:none !important; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><span class="slash">▊</span> COBOL<span style="color:var(--muted)">Doc</span></div>
    <div class="topbar-actions"><span style="font-size:12px;color:var(--muted)">Generado: ${now}</span></div>
  </div>
  <div class="layout">
    <div class="sidebar" style="display:flex">
      <div class="sidebar-head"><span>Archivos</span></div>
      <div class="sidebar-scroll">${sidebarContent}</div>
    </div>
    <div class="content">${docContent}</div>
  </div>
</div>
<script>
document.querySelectorAll('.file-group-header').forEach(h => {
  h.addEventListener('click', function() {
    const name = this.querySelector('.ftype') ? this.textContent.trim() : '';
    const card = Array.from(document.querySelectorAll('.file-card')).find(c => c.querySelector('.file-card-name') && c.querySelector('.file-card-name').textContent.trim() === name.replace(/^\\w+/, '').trim());
    if(card) card.scrollIntoView({behavior:'smooth'});
  });
});
<\/script>
</body>
</html>`;

  const blob = new Blob([fullHtml], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cobol-doc.html';
  a.click();
}
</script>
</body>
</html>
